<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- 3x3 彩色格盤（代表「找顏色」），格距均勻、圓角 -->
  <g filter="url(#sh)">
    <rect x="170" y="170" width="200" height="200" rx="34" fill="#ef4444"/>
    <rect x="412" y="170" width="200" height="200" rx="34" fill="#facc15"/>
    <rect x="654" y="170" width="200" height="200" rx="34" fill="#22c55e"/>
    <rect x="170" y="412" width="200" height="200" rx="34" fill="#3b82f6"/>
    <rect x="412" y="412" width="200" height="200" rx="34" fill="#f97316"/>
    <rect x="654" y="412" width="200" height="200" rx="34" fill="#a855f7"/>
    <rect x="170" y="654" width="200" height="200" rx="34" fill="#ec4899"/>
    <rect x="412" y="654" width="200" height="200" rx="34" fill="#06b6d4"/>
    <rect x="654" y="654" width="200" height="200" rx="34" fill="#84cc16"/>
  </g>
  <!-- 放大鏡：在彩色格盤上「找」，呼應顏色獵人玩法 -->
  <g transform="translate(620 620)">
    <circle cx="0" cy="0" r="172" fill="rgba(255,255,255,0.14)" stroke="#ffffff" stroke-width="38"/>
    <circle cx="0" cy="0" r="172" fill="none" stroke="#1e1b4b" stroke-width="10" opacity="0.45"/>
    <rect x="112" y="112" width="210" height="60" rx="30" transform="rotate(45 112 112)" fill="#ffffff"/>
  </g>
</svg>
